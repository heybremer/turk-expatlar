services:
  postgres:
    image: postgres:16-alpine
    container_name: turk-expatlar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: turkexpatlar
      POSTGRES_PASSWORD: turkexpatlar_dev
      POSTGRES_DB: turkexpatlar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: turk-expatlar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
